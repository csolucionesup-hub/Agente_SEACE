services:
  - type: web
    name: licitascan
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn web_app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: LICITASCAN_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: LICITASCAN_WEBHOOK_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: LICITASCAN_SEARCH_CACHE_TTL
        value: "600"
      - key: LICITASCAN_SEARCH_DEADLINE
        value: "20"
    disk:
      name: licitascan-data
      mountPath: /opt/render/project/src
      sizeGB: 1

  - type: worker
    name: licitascan-worker
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python worker.py --serve
    envVars:
      - key: LICITASCAN_SCHEDULE_MINUTES
        value: "30"
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: LICITASCAN_WEBHOOK_URL
        sync: false
