<svg viewBox="0 0 780 600" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="ttl desc">
  <title id="ttl">Arquitectura de LicitaScan</title>
  <desc id="desc">El usuario entra a LicitaScan (Railway) con login de Google vía Supabase. La búsqueda en vivo sale por un túnel ngrok en la PC del usuario hacia la API pública de OECE/SEACE, porque OECE bloquea las IPs de datacenter y solo deja pasar IPs residenciales. El worker reparte alertas por keywords a cada suscriptor por Telegram.</desc>
  <style>
    .t{font-family:var(--font-voice,ui-sans-serif,system-ui,sans-serif);}
    .ttl{font-weight:700;font-size:15px;}
    .sub{font-size:11.5px;}
    .neutral{fill:var(--surface,#f8fafc);stroke:var(--border-strong,#94a3b8);stroke-width:1.5;}
    .cloud{fill:#2563eb;stroke:#1d4ed8;stroke-width:1.5;}
    .pc{fill:#f59e0b;stroke:#d97706;stroke-width:1.5;}
    .ink{fill:var(--text-primary,#1e293b);}
    .ink-soft{fill:var(--text-secondary,#64748b);}
    .white{fill:#ffffff;}
    .amber-ink{fill:#7c2d12;}
    .edge{stroke:var(--border-strong,#94a3b8);stroke-width:1.6;fill:none;}
    .elbl{font-size:10.5px;fill:var(--text-secondary,#64748b);}
  </style>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="var(--border-strong,#94a3b8)"/>
    </marker>
  </defs>

  <line class="edge" x1="390" y1="88" x2="390" y2="146" marker-end="url(#arr)"/>
  <text class="t elbl" x="398" y="122">usa la app</text>

  <line class="edge" x1="229" y1="185" x2="261" y2="185" marker-start="url(#arr)" marker-end="url(#arr)"/>
  <text class="t elbl" x="245" y="176" text-anchor="middle">login Google</text>

  <path class="edge" d="M330,220 C300,255 270,265 244,298" marker-end="url(#arr)"/>
  <text class="t elbl" x="248" y="262">búsqueda en vivo</text>

  <line class="edge" x1="242" y1="360" x2="242" y2="416" marker-end="url(#arr)"/>
  <text class="t elbl" x="250" y="394">tu IP de Perú pasa</text>

  <path class="edge" d="M452,220 C500,255 540,265 574,298" marker-end="url(#arr)"/>
  <text class="t elbl" x="470" y="262">alertas (worker)</text>

  <line class="edge" x1="577" y1="360" x2="577" y2="416" marker-end="url(#arr)"/>
  <text class="t elbl" x="585" y="394">rutea por keywords</text>

  <g>
    <rect class="neutral" x="300" y="38" width="180" height="50" rx="10"/>
    <text class="t ttl ink" x="390" y="60" text-anchor="middle">Usuario</text>
    <text class="t sub ink-soft" x="390" y="77" text-anchor="middle">navegador · registro</text>
  </g>

  <g>
    <rect class="cloud" x="265" y="148" width="250" height="72" rx="12"/>
    <text class="t ttl white" x="390" y="180" text-anchor="middle">LicitaScan · Railway</text>
    <text class="t sub white" x="390" y="200" text-anchor="middle" opacity="0.9">FastAPI + web (online)</text>
  </g>

  <g>
    <rect class="cloud" x="42" y="160" width="185" height="50" rx="10"/>
    <text class="t ttl white" x="134" y="182" text-anchor="middle">Supabase Auth</text>
    <text class="t sub white" x="134" y="199" text-anchor="middle" opacity="0.9">Google · usuarios</text>
  </g>

  <g>
    <rect class="pc" x="150" y="300" width="185" height="60" rx="10"/>
    <text class="t ttl amber-ink" x="242" y="326" text-anchor="middle">ngrok · tu PC</text>
    <text class="t sub amber-ink" x="242" y="344" text-anchor="middle">túnel · IP residencial</text>
  </g>

  <g>
    <rect class="neutral" x="150" y="418" width="185" height="60" rx="10"/>
    <text class="t ttl ink" x="242" y="444" text-anchor="middle">OECE / SEACE</text>
    <text class="t sub ink-soft" x="242" y="462" text-anchor="middle">API pública OCDS</text>
  </g>

  <g>
    <rect class="cloud" x="470" y="300" width="210" height="60" rx="10"/>
    <text class="t ttl white" x="575" y="326" text-anchor="middle">Worker · repartidor</text>
    <text class="t sub white" x="575" y="344" text-anchor="middle" opacity="0.9">obra → suscriptores</text>
  </g>

  <g>
    <rect class="neutral" x="485" y="418" width="185" height="60" rx="10"/>
    <text class="t ttl ink" x="577" y="444" text-anchor="middle">Telegram</text>
    <text class="t sub ink-soft" x="577" y="462" text-anchor="middle">alerta a cada cliente</text>
  </g>

  <g transform="translate(150,520)">
    <rect class="cloud" x="0" y="0" width="16" height="16" rx="4"/>
    <text class="t elbl" x="22" y="12">en la nube (Railway · Supabase)</text>
    <rect class="pc" x="250" y="0" width="16" height="16" rx="4"/>
    <text class="t elbl" x="272" y="12">en tu PC (túnel ngrok)</text>
  </g>
</svg>
